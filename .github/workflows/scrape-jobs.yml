name: Scrape Jobs (Daily Refresh)

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [scrape-jobs]

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: careerpilot-ai/python-service/requirements.txt

      - name: Install dependencies
        working-directory: careerpilot-ai/python-service
        run: pip install -r requirements.txt

      - name: Run scraper pipeline
        working-directory: careerpilot-ai/python-service
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEFAULT_HOURS_OLD: "48"
          DEFAULT_RESULTS_WANTED: "25"
          SCRAPE_DELAY_SECONDS: "1.5"
        run: python run_scraper.py
