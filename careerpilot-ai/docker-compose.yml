version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    env_file: ./backend/.env
    environment:
      - PYTHON_SERVICE_URL=http://python-service:8000
    depends_on:
      - python-service
    volumes:
      - ./backend/uploads:/app/uploads

  python-service:
    build: ./python-service
    ports:
      - '8000:8000'
    env_file: ./python-service/.env

networks:
  default:
    name: careerpilot-network
